<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Consensus desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root, :root[data-theme="dark"]{
  --paper:#12100e; --panel:#1a1815; --raised:#211e1a;
  --ink:#f2ede4; --ink-2:#a39c90; --ink-3:#8b8375;
  --rule:#2b2721; --rule-2:#3a352d;
  --up:#d4593f; --down:#5b9e7a; --flat:#6b655c; --mark:#c9a227;
}
:root[data-theme="light"]{
  --paper:#f8f5ef; --panel:#efe9df; --raised:#e6dfd2;
  --ink:#1c1813; --ink-2:#544d43; --ink-3:#787064;
  --rule:#e0d8ca; --rule-2:#cbc1af;
  --up:#b8412a; --down:#2f7355; --flat:#787064; --mark:#8a6a12;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:Inter,system-ui,sans-serif;
  font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;padding:0 0 80px;
  transition:background-color .2s ease,color .2s ease}
.wrap{max-width:940px;margin:0 auto;padding:0 24px}
.mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}

header{position:relative;border-bottom:1px solid var(--rule-2);padding:36px 0 20px;margin-bottom:32px}
#theme-toggle{position:absolute;top:34px;right:0;width:34px;height:34px;
  background:var(--panel);border:1px solid var(--rule-2);border-radius:6px;
  color:var(--ink-2);font-size:15px;line-height:1;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s ease}
#theme-toggle:hover{color:var(--ink);border-color:var(--ink-3)}
h1{font-family:Newsreader,serif;font-size:34px;font-weight:400;letter-spacing:-.015em}
.sub{color:var(--ink-3);font-size:12px;letter-spacing:.09em;text-transform:uppercase;margin-top:8px}

.eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);
  margin:36px 0 14px;display:flex;align-items:center;gap:12px}
.eyebrow::after{content:'';flex:1;height:1px;background:var(--rule)}

.alert{border-left:2px solid var(--up);background:var(--panel);padding:14px 18px;margin-bottom:8px}
.alert.spread{border-left-color:var(--mark)}
.alert.volume_divergence{border-left-color:var(--ink-2)}
.alert-kind{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin-bottom:4px}
.alert-head{font-size:15px}
.alert-detail{font-size:12px;color:var(--ink-2);margin-top:4px}
.quiet{color:var(--ink-3);font-size:14px;padding:14px 0}

.row{display:grid;grid-template-columns:1fr 108px 92px;gap:18px;align-items:center;
  padding:16px 0;border-bottom:1px solid var(--rule);cursor:pointer;
  background:var(--paper);touch-action:pan-y;will-change:transform}
.row:hover{background:var(--panel)}
.row.will-remove{background:var(--up)}
.row.will-remove .row-q,.row.will-remove .row-p{color:#fff}
.row.will-remove .row-meta{color:rgba(255,255,255,.75)}
.row-q{font-size:15px}
.row-meta{font-size:11px;color:var(--ink-3);margin-top:3px;letter-spacing:.03em}
.row-val{text-align:right}
.row-p{font-size:19px}
.row-d{font-size:11px;margin-top:2px}
.up{color:var(--up)} .down{color:var(--down)} .flat{color:var(--flat)}
.spark-cell{min-width:0}
svg.spark{display:block;width:100%;height:auto}

.detail{background:var(--panel);border-left:2px solid var(--rule-2);padding:22px 24px;margin:0 0 8px}
.detail-head{display:flex;justify-content:space-between;align-items:baseline;gap:20px;margin-bottom:2px}
.detail-q{font-family:Newsreader,serif;font-size:20px;font-weight:400}
.detail-p{font-size:30px}
.detail-meta{font-size:11px;color:var(--ink-3);letter-spacing:.05em;margin-bottom:20px}

.src{display:grid;grid-template-columns:120px 1fr 52px 68px;gap:12px;align-items:center;
  padding:7px 0;font-size:13px}
.src-name{color:var(--ink)}
.src-track{height:5px;background:var(--raised)}
.src-fill{height:5px;background:var(--ink-2)}
.src-fill.lead{background:var(--mark)}
.src-p{text-align:right}
.src-w{text-align:right;font-size:11px;color:var(--ink-3)}
.stale{color:var(--up)}

.note{border-top:1px solid var(--rule);margin-top:18px;padding-top:14px}
.note-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin-bottom:6px}
.note-body{font-family:Newsreader,serif;font-size:16px;line-height:1.65;color:var(--ink)}
.crit{font-size:12px;color:var(--ink-2);margin-top:10px;padding-left:12px;border-left:1px solid var(--rule-2)}
.chart svg{display:block;width:100%;height:88px;background:var(--raised);border-radius:5px}
.chart-cap{font-size:10px;color:var(--ink-3);margin:6px 0 16px;letter-spacing:.04em}
.detail-actions{margin-top:20px;border-top:1px solid var(--rule);padding-top:12px}
.remove-link{color:var(--ink-3);font-size:12px;text-decoration:none;letter-spacing:.05em}
.remove-link:hover{color:var(--up)}
#cd-toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:8px;font-size:13px;
  opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:50;max-width:90vw}
#cd-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

footer{margin-top:48px;padding-top:20px;border-top:1px solid var(--rule);
  font-size:11px;color:var(--ink-3);letter-spacing:.04em;display:flex;
  justify-content:space-between;flex-wrap:wrap;gap:10px}
#add-topic{border:1px solid var(--rule-2);border-radius:8px;background:var(--panel);margin-bottom:28px}
#add-topic summary{cursor:pointer;padding:12px 16px;font-size:12px;letter-spacing:.06em;
  text-transform:uppercase;color:var(--ink-2);user-select:none;list-style:none}
#add-topic summary::-webkit-details-marker{display:none}
#add-topic summary:hover{color:var(--ink)}
#add-topic[open] summary{border-bottom:1px solid var(--rule);color:var(--ink)}
.add-body{padding:14px 16px}
.add-row{display:flex;gap:8px}
#add-q{flex:1;background:var(--paper);border:1px solid var(--rule-2);color:var(--ink);
  padding:9px 12px;border-radius:6px;font-family:inherit;font-size:14px;min-width:0}
#add-q:focus{outline:none;border-color:var(--ink-3)}
#add-search{background:var(--ink);color:var(--paper);border:none;border-radius:6px;
  padding:9px 18px;font-size:13px;cursor:pointer;font-family:inherit}
#add-search:hover{opacity:.88}
#add-results{margin-top:6px}
.cand{display:flex;justify-content:space-between;align-items:center;gap:14px;
  padding:11px 0;border-bottom:1px solid var(--rule)}
.cand-main{min-width:0}
.cand-q{font-size:14px}
.cand-meta{font-size:11px;color:var(--ink-3);margin-top:2px}
.cand-add{color:var(--mark);text-decoration:none;font-size:13px;white-space:nowrap;
  border:1px solid var(--rule-2);padding:6px 13px;border-radius:6px}
.cand-add:hover{border-color:var(--mark)}
.add-hint{font-size:11px;color:var(--ink-3);margin-top:12px;line-height:1.55}
@media(max-width:640px){
  .row{grid-template-columns:1fr 54px 58px;gap:10px}
  .src{grid-template-columns:96px 1fr 46px}
  .src-w{display:none}
}
</style>
<script>
  // Set theme before paint to avoid a flash. Default: follow OS, else dark.
  (function () {
    var saved = localStorage.getItem('cd-theme');
    if (!saved) {
      saved = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches
        ? 'light' : 'dark';
    }
    document.documentElement.setAttribute('data-theme', saved);
  })();
</script>
</head>
<body>
<div class="wrap">
  <header>
    <button id="theme-toggle" aria-label="Toggle light and dark theme" title="Toggle theme"></button>
    <h1>Consensus desk</h1>
    <div class="sub mono" id="stamp">loading</div>
  </header>
  <details id="add-topic">
    <summary>+ Add a topic</summary>
    <div class="add-body">
      <div class="add-row">
        <input id="add-q" type="text" autocomplete="off"
               placeholder="Describe a topic — e.g. will the US enter recession in 2026" />
        <button id="add-go">Add topic</button>
      </div>
      <div class="add-hint">Claude finds the best market on each venue (Polymarket, Manifold,
        PredictIt) and wires them into one topic. Clicking opens a pre-filled GitHub issue —
        confirm it and the topic joins the board in a few minutes.</div>
    </div>
  </details>
  <div id="app"></div>
  <footer>
    <span id="foot-method"></span>
    <span id="foot-weights"></span>
  </footer>
</div>

<script>
const pct = v => (v == null ? '—' : v.toFixed(1) + '%');
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// Add-a-topic: describe in plain English -> pre-filled GitHub issue -> the
// workflow runs the multi-source Claude matcher and wires the topic.
const REPO = 'mat4zan/consensus-desk';
// Set this to your deployed serverless endpoint to make add/remove happen
// directly from the dashboard — no GitHub visit, no email. Empty = fall back
// to the one-click GitHub issue.
window.WORKER_URL = '';

function manageSecret() {
  let s = localStorage.getItem('cd-manage-key');
  if (!s) {
    s = (prompt('Enter your management passphrase (stored once in this browser):') || '').trim();
    if (s) localStorage.setItem('cd-manage-key', s);
  }
  return s;
}

async function postManage(action, payload) {
  const secret = manageSecret();
  if (!secret) return false;
  try {
    const r = await fetch(window.WORKER_URL, {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify(Object.assign({ action, secret }, payload))
    });
    if (r.status === 401) { localStorage.removeItem('cd-manage-key'); toast('Wrong passphrase — try again.'); return false; }
    if (!r.ok) { toast('Request failed (' + r.status + ').'); return false; }
    toast(action === 'add' ? 'Got it — building the topic…' : 'Removing…');
    return true;
  } catch (e) { toast('Could not reach the server.'); return false; }
}

function toast(msg) {
  let el = document.getElementById('cd-toast');
  if (!el) { el = document.createElement('div'); el.id = 'cd-toast'; document.body.appendChild(el); }
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(() => el.classList.remove('show'), 3500);
}

function addTopic() {
  const q = document.getElementById('add-q').value.trim();
  if (!q) return;
  if (window.WORKER_URL) { postManage('add', { request: q }); document.getElementById('add-q').value = ''; return; }
  const body = 'Requested from the dashboard. The line below is machine-read; leave it intact.'
    + '\n\nrequest: ' + q;
  const url = 'https://github.com/' + REPO + '/issues/new?title='
    + encodeURIComponent('[add-topic] ' + q) + '&body=' + encodeURIComponent(body);
  window.open(url, '_blank', 'noopener');
}
document.getElementById('add-go').addEventListener('click', addTopic);
document.getElementById('add-q').addEventListener('keydown', e => { if (e.key === 'Enter') addTopic(); });

// Theme toggle: button shows the theme you'll switch TO.
(function () {
  const btn = document.getElementById('theme-toggle');
  const root = document.documentElement;
  const paint = () => { btn.textContent = root.getAttribute('data-theme') === 'light' ? '☾' : '☀'; };
  btn.addEventListener('click', () => {
    const next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    root.setAttribute('data-theme', next);
    localStorage.setItem('cd-theme', next);
    paint();
  });
  paint();
})();

function spark(hist, w = 100, h = 26) {
  if (!hist || hist.length < 2) return '';
  const ys = hist.map(d => d.p);
  const lo = Math.min(...ys), hi = Math.max(...ys), rng = (hi - lo) || 1;
  const pts = hist.map((d, i) => {
    const x = (i / (hist.length - 1)) * w;
    const y = h - ((d.p - lo) / rng) * (h - 4) - 2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const rising = ys[ys.length - 1] >= ys[0];
  const col = rising ? 'var(--up)' : 'var(--down)';
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" aria-hidden="true">
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.3"/></svg>`;
}

// Full-width line chart for the detail panel (visible on mobile too).
function removeIssueUrl(id) {
  const body = 'Requested from the dashboard. The line below is machine-read; leave it intact.'
    + '\n\nremove: ' + id;
  return 'https://github.com/' + REPO + '/issues/new?title='
    + encodeURIComponent('[remove-topic] ' + id) + '&body=' + encodeURIComponent(body);
}

function bigChart(hist) {
  if (!hist || hist.length < 2)
    return '<div class="chart-cap mono">Not enough history yet for a chart.</div>';
  const w = 600, h = 88, pad = 8;
  const ys = hist.map(d => d.p);
  const lo = Math.min(...ys), hi = Math.max(...ys), rng = (hi - lo) || 1;
  const pts = hist.map((d, i) => {
    const x = (i / (hist.length - 1)) * w;
    const y = h - pad - ((d.p - lo) / rng) * (h - 2 * pad);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const col = ys[ys.length - 1] >= ys[0] ? 'var(--up)' : 'var(--down)';
  return `<div class="chart"><svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" aria-hidden="true">
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2" vector-effect="non-scaling-stroke"/>
    </svg></div><div class="chart-cap mono">${hist.length} points · ${ys[0].toFixed(1)}% → ${ys[ys.length - 1].toFixed(1)}%</div>`;
}

function deltaHtml(d) {
  if (d == null) return '<span class="flat mono">—</span>';
  if (Math.abs(d) < 0.5) return '<span class="flat mono">—</span>';
  const cls = d > 0 ? 'up' : 'down';
  const arrow = d > 0 ? '▲' : '▼';
  return `<span class="${cls} mono">${arrow} ${Math.abs(d).toFixed(1)}</span>`;
}

function sourcesHtml(t) {
  const maxW = Math.max(...t.contributions.map(c => c.weight), 0.01);
  return t.contributions.map(c => {
    const lead = c.weight >= maxW ? ' lead' : '';
    const stale = c.stale ? ` <span class="stale">·${Math.round(c.age_hours)}h</span>` : '';
    return `<div class="src">
      <span class="src-name">${esc(c.source)}${stale}</span>
      <span class="src-track"><span class="src-fill${lead}" style="width:${(c.probability * 100).toFixed(1)}%"></span></span>
      <span class="src-p mono">${(c.probability * 100).toFixed(0)}%</span>
      <span class="src-w mono">w ${c.weight.toFixed(2)}</span>
    </div>`;
  }).join('');
}

function detailHtml(t) {
  const notes = Object.entries(t.criteria_notes || {})
    .map(([s, n]) => `<div class="crit"><strong>${esc(s)}</strong> — ${esc(n)}</div>`).join('');
  const exp = t.explanation
    ? `<div class="note"><div class="note-label">Why they disagree</div>
       <div class="note-body">${esc(t.explanation)}</div>${notes}</div>`
    : (notes ? `<div class="note"><div class="note-label">Criteria notes</div>${notes}</div>` : '');
  const exc = (t.excluded || []).length
    ? `<div class="crit" style="margin-top:12px">Excluded: ${t.excluded.map(e => esc(e.source) + ' (' + esc(e.reason) + ')').join(', ')}</div>`
    : '';
  const rmUrl = removeIssueUrl(t.id);
  return `<div class="detail">
    <div class="detail-head">
      <span class="detail-q">${esc(t.question)}</span>
      <span class="detail-p mono">${t.probability.toFixed(1)}%</span>
    </div>
    <div class="detail-meta mono">${t.n_sources} sources · spread ${t.spread_pp.toFixed(0)}pp · expires ${esc(t.expiry).slice(0, 10)}</div>
    ${bigChart(t.history)}
    ${sourcesHtml(t)}${exp}${exc}
    <div class="detail-actions"><a class="remove-link" href="${rmUrl}" target="_blank" rel="noopener">Remove from board →</a></div>
  </div>`;
}

function render(s) {
  const upd = new Date(s.generated_at);
  const local = upd.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
  const mins = Math.max(0, Math.round((Date.now() - upd.getTime()) / 60000));
  const rel = mins < 1 ? 'just now' : mins < 60 ? mins + 'm ago' : Math.round(mins / 60) + 'h ago';
  document.getElementById('stamp').textContent =
    'last update: ' + local + ' (' + rel + ') · ' + s.topics.length + ' topics';
  document.getElementById('foot-method').textContent =
    `pooling ${s.method} · extremize ${s.extremize} · weights ${s.weight_strategy} (${s.n_resolved} resolved)`;
  // Show weights only for sources actually contributing to the board.
  const active = new Set();
  s.topics.forEach(t => (t.contributions || []).forEach(c => active.add(c.source)));
  document.getElementById('foot-weights').textContent =
    Object.entries(s.weights).filter(([k]) => active.has(k)).map(([k, v]) => `${k} ${v}`).join('  ');

  const parts = [];

  parts.push('<div class="eyebrow">Attention</div>');
  if (s.alerts.length) {
    for (const a of s.alerts) {
      const d = a.detail || {};
      let sub = '';
      if (a.kind.startsWith('move')) sub = `${d.from}% → ${d.to}% over ${d.window_hours}h`;
      else if (a.kind === 'spread') sub = `${d.highest.source} ${d.highest.p}% vs ${d.lowest.source} ${d.lowest.p}%`;
      else if (a.kind === 'volume_divergence') sub = `${d.source}: price moved ${d.price_move_pp}pp`;
      parts.push(`<div class="alert ${esc(a.kind)}">
        <div class="alert-kind">${esc(a.kind.replace(/_/g, ' '))}</div>
        <div class="alert-head">${esc(a.headline)}</div>
        <div class="alert-detail mono">${esc(sub)}</div></div>`);
    }
  } else {
    parts.push('<div class="quiet">Nothing crossed threshold.</div>');
  }

  parts.push('<div class="eyebrow">Board</div>');
  for (const t of s.topics) {
    parts.push(`<div class="row" data-id="${esc(t.id)}">
      <div>
        <div class="row-q">${esc(t.question)}</div>
        <div class="row-meta mono">${t.contributions.map(c => esc(c.source)).join(' · ')}</div>
      </div>
      <span class="spark-cell">${spark(t.history)}</span>
      <div class="row-val">
        <div class="row-p mono">${t.probability.toFixed(1)}%</div>
        <div class="row-d">${deltaHtml(t.delta_24h_pp)}</div>
      </div>
    </div><div class="slot" data-slot="${esc(t.id)}"></div>`);
  }

  document.getElementById('app').innerHTML = parts.join('');

  const byId = Object.fromEntries(s.topics.map(t => [t.id, t]));
  const THRESH = 80;              // px past which a swipe removes
  document.querySelectorAll('.row').forEach(row => {
    let sx = 0, sy = 0, mode = null, dx = 0, active = false;

    const settle = () => { row.style.transition = 'transform .18s ease';
      row.style.transform = ''; row.classList.remove('will-remove'); };
    const start = (x, y) => { sx = x; sy = y; mode = null; dx = 0; active = true;
      row.style.transition = 'none'; };
    const move = (x, y, ev) => {
      if (!active) return;
      const mx = x - sx, my = y - sy;
      if (mode === null) {
        if (Math.abs(mx) > 8 && Math.abs(mx) > Math.abs(my) + 3) mode = 'swipe';
        else if (Math.abs(my) > 8) { mode = 'scroll'; active = false; return; }
      }
      if (mode === 'swipe') {
        if (ev.cancelable) ev.preventDefault();       // claim the gesture from the browser
        dx = Math.max(-150, Math.min(150, mx));
        row.style.transform = `translateX(${dx}px)`;
        row.classList.toggle('will-remove', Math.abs(dx) > THRESH);
      }
    };
    const end = () => {
      if (mode === 'swipe') { if (Math.abs(dx) > THRESH) removeTopic(row.dataset.id); settle(); }
      active = false; mode = null;
    };

    row.addEventListener('touchstart', e => start(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
    row.addEventListener('touchmove', e => move(e.touches[0].clientX, e.touches[0].clientY, e), { passive: false });
    row.addEventListener('touchend', end);
    row.addEventListener('touchcancel', () => { settle(); active = false; mode = null; });
    row.addEventListener('mousedown', e => start(e.clientX, e.clientY));
    window.addEventListener('mousemove', e => { if (active) move(e.clientX, e.clientY, e); });
    window.addEventListener('mouseup', () => { if (active) end(); });

    row.addEventListener('click', () => {
      if (Math.abs(dx) > 10) { dx = 0; return; }   // that was a swipe, not a tap
      const id = row.dataset.id;
      const slot = document.querySelector(`[data-slot="${id}"]`);
      slot.innerHTML = slot.innerHTML ? '' : detailHtml(byId[id]);
    });
  });
}

// How removal happens. When a serverless endpoint is configured (WORKER_URL),
// this posts directly — no GitHub, no email. Otherwise it falls back to the
// one-click GitHub issue.
function removeTopic(id) {
  if (window.WORKER_URL) {
    postManage('remove', { id });
  } else {
    window.open(removeIssueUrl(id), '_blank', 'noopener');
  }
}

fetch('snapshot.json?' + Date.now())
  .then(r => r.json())
  .then(render)
  .catch(() => {
    document.getElementById('app').innerHTML =
      '<div class="quiet">No snapshot found. Run <span class="mono">python run.py pool</span>.</div>';
    document.getElementById('stamp').textContent = 'no data';
  });
</script>
</body>
</html>
