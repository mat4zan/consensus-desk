name: orc
on:
  workflow_dispatch:
jobs:
  o:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python tools/orc.py
