name: digest

on:
  schedule:
    - cron: "0 4 * * *"   # 07:00 Europe/Bucharest (EEST)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Build digest
        run: python run.py digest

      - name: Job summary
        run: cat data/digest.md >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v4
        with:
          name: digest
          path: data/digest.md

      # Note: the LIVE dashboard is deployed by the collect workflow after each
      # 6h run, so it is always current. This workflow only builds the daily
      # markdown digest + Actions job summary; it no longer deploys Pages.
