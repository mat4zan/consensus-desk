name: mdisc
on:
  workflow_dispatch:
jobs:
  d:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - env:
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }}
        run: python tools/mdisc.py
