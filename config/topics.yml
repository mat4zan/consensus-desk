      publicly acknowledged or confirmed by two major outlets.
      Proxy action does not count.
    expiry: 2026-10-01
    review: 2026-08-15
    sources:
      polymarket:
        id: "israel-iran-strike-2026"
      metaculus:
        id: 34567

