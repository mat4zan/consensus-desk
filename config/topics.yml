# Tracked questions.
#
# `resolution` is canonical — it is YOUR definition of the event.
# Each source mapping asserts that source's criteria are close enough.
# Where they are not, write a criteria_note. The note gets surfaced in the
# disagreement panel so you do not rediscover the mismatch every time.
#
# All IDs below were verified live against each platform's API:
#   polymarket -> market slug   (gamma-api.polymarket.com/markets?slug=)
#   kalshi     -> market ticker (api.elections.kalshi.com .../markets/{ticker})
#   manifold   -> market slug   (api.manifold.markets/v0/slug/{slug})
# Metaculus/Good Judgment are intentionally omitted: Metaculus gates aggregate
# community-prediction data behind elevated API access a basic token lacks, and
# no Good Judgment collector exists.

topics:

  - id: taiwan_invasion_2027
    question: "China invades Taiwan before 2028"
    domain: geopolitics
    resolution: >
      China commences a military offensive intended to establish control
      over any portion of Taiwan before 2028-01-01, per credible reporting
      from two or more major outlets. Exercises and blockades short of an
      offensive do not resolve YES.
    expiry: 2028-01-01
    review: 2026-10-01
    sources:
      polymarket:
        id: "will-china-invade-taiwan-by-december-31-2027"
        criteria_note: >
          Reframed from the original "blockade or quarantine" question:
          no liquid blockade-specific market exists. This market resolves
          on an invasion / military offensive, which is a strictly higher
          bar than interdiction. Read the level, not the label.
      manifold:
        id: "will-china-attempt-to-invade-taiwan"
        criteria_note: >
          Manifold asks "attempt to invade by end of 2027" — an attempt is a
          slightly lower bar than Polymarket's "commences an offensive", so
          expect it to sit marginally higher.

  - id: ru_ua_ceasefire_2026
    question: "Russia-Ukraine ceasefire agreement by year end 2026"
    domain: geopolitics
    resolution: >
      A mutually agreed suspension of direct military engagement between
      Russia and Ukraine, officially announced by both governments or
      confirmed by a consensus of credible reporting, in force as of
      2026-12-31. Partial deals (energy, Black Sea only) do not qualify.
    expiry: 2026-12-31
    review: 2026-09-01
    sources:
      polymarket:
        id: "russia-x-ukraine-ceasefire-agreement-by-december-31-2026"
      manifold:
        id: "russia-x-ukraine-ceasefire-in-2026"
        criteria_note: >
          Manifold asks "a ceasefire at any point in 2026", vs Polymarket's
          "agreement in force at year-end". Any-point-in-year is a broader
          window, yet Manifold sits lower — the gap is a criteria/venue
          difference to read, not a straight disagreement on likelihood.

  - id: us_invade_iran_2027
    question: "US invades Iran before 2027"
    domain: geopolitics
    resolution: >
      US ground forces commence a military offensive on Iranian territory
      before 2027-01-01, publicly acknowledged or confirmed by two major
      outlets. Airstrikes alone do not resolve YES.
    expiry: 2027-01-01
    review: 2026-09-01
    sources:
      polymarket:
        id: "will-the-us-invade-iran-before-2027"
        criteria_note: >
          Deepest market on the board (>$45M volume). Replaces the original
          "direct Israel-Iran exchange" question, which has no liquid market
          now that a ceasefire is in place.
      manifold:
        id: "will-the-us-invade-iran-before-the-zs06u6hptc"

  - id: iran_regime_fall_2026
    question: "Iranian regime falls before 2027"
    domain: geopolitics
    resolution: >
      The current Islamic Republic government loses effective control of the
      Iranian state before 2027-01-01 — via collapse, overthrow, or formal
      dissolution — per a consensus of credible reporting.
    expiry: 2027-01-01
    review: 2026-09-01
    sources:
      polymarket:
        id: "will-the-iranian-regime-fall-by-the-end-of-2026"
      manifold:
        id: "will-irans-regime-fall-in-2026"

  - id: fed_july_2026_cut
    question: "Fed cuts 25bp at the July 2026 FOMC meeting"
    domain: macro
    resolution: >
      The FOMC lowers the target range by exactly 25bp at its July 2026
      meeting.
    expiry: 2026-07-31
    review: 2026-07-28
    # Layer-2 oracle: the FRED fed-funds target upper limit steps down 0.25
    # when the Fed cuts, so a drop over the meeting window resolves YES.
    oracle:
      source: fred
      series: DFEDTARU
      rule: dropped
      amount: 0.25
      window_start: 2026-07-20
      by: 2026-08-01
    sources:
      polymarket:
        id: "will-the-fed-decrease-interest-rates-by-25-bps-after-the-july-2026-meeting"
      kalshi:
        id: "KXFEDDECISION-26JUL-C25"
        criteria_note: >
          Same event on both venues — this is the one genuinely cross-source
          topic on the board, kept short-horizon on purpose to demonstrate the
          pooling and to accumulate a resolved question quickly for scoring.

  - id: fed_september_2026_cut
    question: "Fed cuts 25bp at the September 2026 FOMC meeting"
    domain: macro
    resolution: >
      The FOMC lowers the target range by 25bp or more at its September 2026
      meeting.
    expiry: 2026-09-30
    review: 2026-08-15
    oracle:
      source: fred
      series: DFEDTARU
      rule: dropped
      amount: 0.25
      window_start: 2026-09-10
      by: 2026-10-01
    sources:
      kalshi:
        id: "KXFEDDECISION-26SEP-C25"
        criteria_note: >
          Ticker is the "cut exactly 25bp" outcome. A >25bp cut resolves the
          -C26 ticker instead, so this slightly under-counts the canonical
          "25bp or more". Combine C25 + C26 if that gap ever matters.

  - id: senate_control_2026_r
    question: "Republicans control the US Senate after the 2026 midterms"
    domain: elections
    resolution: >
      The Republican Party holds a Senate majority (50+ seats with the VP
      tiebreak, or 51+) in the Congress convening January 2027, per called
      results from a consensus of major networks.
    expiry: 2026-11-04
    review: 2026-10-15
    sources:
      polymarket:
        id: "will-the-republican-party-control-the-senate-after-the-2026-midterm-elections"
      predictit:
        id: 8155
        outcome: "Republican"
      manifold:
        id: "will-republicans-win-the-senate-in-738388924521"
        criteria_note: >
          Elections are the one theme traded on every venue at once, so this
          is the board's widest cross-source topic. Real-money venues
          (Polymarket, PredictIt) are correlation-damped together; Manifold
          is an independent play-money crowd.

  # Short-horizon topic on purpose: it resolves within days, so the full
  # collect -> pool -> resolve -> score loop can be exercised end-to-end
  # quickly rather than waiting months. Resolve it with:
  #   python run.py resolve --topic xi_us_visit_july --outcome 0|1
  - id: xi_us_visit_july
    question: "Xi Jinping visits the USA before August 2026"
    domain: geopolitics
    resolution: >
      Xi Jinping sets foot on US soil in an official capacity before
      2026-08-01, per credible reporting.
    expiry: 2026-07-31
    review: 2026-07-30
    sources:
      manifold:
        id: "xi-jingping-visits-usa-before-july"
